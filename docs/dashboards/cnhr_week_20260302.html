// === LEAFLET MAP (Route Map mode) ===
function gradientColor(value,min,max){
  var t=(max>min)?(value-min)/(max-min):0.5;
  var r,g,b;
  if(t<0.5){r=255;g=Math.round(255*t*2);b=Math.round(50*(1-t*2));}
  else{r=Math.round(255*(1-(t-0.5)*2));g=255;b=Math.round(50*(1-(t-0.5)*2));}
  return "rgb("+r+","+g+","+b+")";
}
function getMapTripColor(t,trips){
  if(mapColorMode==="default")return t.color;
  if(mapColorMode==="four_state")return SC[t.four_state]||"#666";
  var key=mapColorMode==="mnhr"?"mnhr_true":mapColorMode==="per_hr"?"per_hr":"per_mile";
  var vals=trips.map(function(x){return x[key]||0});
  return gradientColor(t[key]||0,Math.min.apply(null,vals),Math.max.apply(null,vals));
}

function destroyMap(){
  if(weekMap){weekMap.remove();weekMap=null;}
  mapTripLayers={};mapDeadheadLayers=[];mapSelectedTrip=null;
}

function makeLeafletMap(week){
  destroyMap();
  var mapDiv=document.getElementById("week-map");
  if(!mapDiv)return;
  weekMap=L.map("week-map",{preferCanvas:true}).setView([51.50,-0.05],11);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"&copy; OSM &copy; CARTO",maxZoom:19}).addTo(weekMap);
  buildMapLayers(week);
  mapShowAll(week);
}

function buildMapLayers(week){
  var trips=week.trips;
  Object.values(mapTripLayers).forEach(function(l){if(l.enroute)l.enroute.remove();if(l.trip)l.trip.remove();l.markers.forEach(function(m){m.remove();});});
  mapDeadheadLayers.forEach(function(l){l.remove();});
  mapTripLayers={};mapDeadheadLayers=[];

  trips.forEach(function(t){
    var c=getMapTripColor(t,trips);
    var layers={enroute:null,trip:null,markers:[]};
    var popup="<b>#"+t.n+" "+t.pax+"</b><br>\u00a3"+t.t_earn+" ("+t.service+")<br>\u03c1="+t.rho_paid+"/hr u="+Math.round(t.util*100)+"%";
    if(t.has_gps_track&&t.enroute_track&&t.enroute_track.length>1){
      layers.enroute=L.polyline(t.enroute_track,{color:"#FFA500",weight:4,opacity:0.8,dashArray:"10,6"});layers.enroute.bindPopup(popup);
    }
    if(t.has_gps_track&&t.trip_track&&t.trip_track.length>1){
      layers.trip=L.polyline(t.trip_track,{color:c,weight:4,opacity:0.9});layers.trip.bindPopup(popup);
    }
    if(t.pickup_pos){var pm=L.circleMarker(t.pickup_pos,{radius:5,color:c,fillColor:c,fillOpacity:0.9,weight:2});pm.bindPopup("#"+t.n+" PICKUP "+t.pickup);layers.markers.push(pm);}
    if(t.dropoff_pos){var dm=L.circleMarker(t.dropoff_pos,{radius:5,color:c,fillColor:"#111",fillOpacity:0.9,weight:3});dm.bindPopup("#"+t.n+" DROPOFF "+t.dropoff);layers.markers.push(dm);}
    mapTripLayers[t.n]=layers;
  });

  var dh=week.map_deadheads||[];
  dh.forEach(function(d){
    if(d.track&&d.track.length>1){
      var line=L.polyline(d.track,{color:"#666",weight:2,opacity:0.4,dashArray:"4,8"});
      line.bindPopup("Deadhead: #"+d.from_trip+" \u2192 #"+d.to_trip);
      mapDeadheadLayers.push(line);
    }
  });
}

function mapClearAll(){
  Object.values(mapTripLayers).forEach(function(l){if(l.enroute)l.enroute.remove();if(l.trip)l.trip.remove();l.markers.forEach(function(m){m.remove();});});
  mapDeadheadLayers.forEach(function(l){l.remove();});
}

function mapShowTrip(num){
  // Highlight table row
  $$("tr.map-selected").forEach(function(r){r.classList.remove("map-selected");});
  $$("tr.map-clickable").forEach(function(r){
    var firstTd=r.querySelector("td");
    if(firstTd&&parseInt(firstTd.textContent)===num)r.classList.add("map-selected");
  });
  // If map not initialized yet, expand it
  if(!weekMap){
    var body=document.getElementById("map-body");
    var toggle=document.querySelector(".map-toggle");
    if(body&&body.style.display==="none"){
      body.style.display="block";
      if(toggle)toggle.style.borderRadius="10px 10px 0 0";
      var chev=toggle&&toggle.querySelector("span");
      if(chev)chev.textContent="\u25bc";
      var curW=W[selIdx];
      setTimeout(function(){makeLeafletMap(curW);setTimeout(function(){mapShowTrip(num);},100);},100);
      return;
    }
  }
  if(!weekMap)return;
  mapClearAll();mapSelectedTrip=num;
  var l=mapTripLayers[num];if(!l)return;
  var bounds=L.latLngBounds([]);
  if(l.enroute){l.enroute.addTo(weekMap);bounds.extend(l.enroute.getBounds());}
  if(l.trip){l.trip.addTo(weekMap);bounds.extend(l.trip.getBounds());}
  l.markers.forEach(function(m){m.addTo(weekMap);bounds.extend(m.getLatLng());});
  if(bounds.isValid())weekMap.fitBounds(bounds,{padding:[40,40]});
}

function mapShowAll(week){
  mapClearAll();mapSelectedTrip=null;
  $$("tr.map-selected").forEach(function(r){r.classList.remove("map-selected");});
  var bounds=L.latLngBounds([]);
  Object.values(mapTripLayers).forEach(function(l){
    if(l.enroute){l.enroute.addTo(weekMap);try{bounds.extend(l.enroute.getBounds())}catch(e){}}
    if(l.trip){l.trip.addTo(weekMap);try{bounds.extend(l.trip.getBounds())}catch(e){}}
    l.markers.forEach(function(m){m.addTo(weekMap);bounds.extend(m.getLatLng());});
  });
  mapDeadheadLayers.forEach(function(l){l.addTo(weekMap);try{bounds.extend(l.getBounds())}catch(e){}});
  if(bounds.isValid())weekMap.fitBounds(bounds,{padding:[40,40]});
}

function setMapColorMode(mode,week){
  mapColorMode=mode;
  $$(".map-color-btn").forEach(function(b){b.classList.toggle("active",b.dataset.mode===mode);});
  buildMapLayers(week);

  dayKeys.forEach(function(dk){
    var dd=w.days[dk];var dayDiv=el("div",{className:"insight-day"});
    dayDiv.appendChild(el("div",{className:"insight-day-hdr"},dk+" \u00b7 "+dd.n+" trips \u00b7 \u00a3"+m$(dd.earn)+" \u00b7 "+dd.hours.toFixed(2)+"h"));
    dd.trips.forEach(function(t){
      var phase=t.r_n>=RS?"target":t.r_n>=0?"recovery":"deficit";
      var stCol=SC[t.state]||"#94a3b8";
      var tripDiv=el("div",{className:"insight-trip phase-"+phase});
      var stBadge=el("span",{className:"insight-state"});stBadge.style.background=stCol+"25";stBadge.style.color=stCol;stBadge.textContent=SL[t.state]||t.state;
      tripDiv.appendChild(el("span",{className:"trip-num"},"#"+t.n+" "+t.time+" "));
      tripDiv.appendChild(stBadge);
      tripDiv.appendChild(document.createTextNode(" r\u2099=\u00a3"+m$(t.r_n)+" \u03c1=\u00a3"+m$(t.t_rho)+" m\u0303=\u00a3"+m$(t.mnhr_ema)));
      dayDiv.appendChild(tripDiv);
    });
    insBody.appendChild(dayDiv);
  });
  panel.appendChild(insBody);

  // Trip table
  var tblWrap=el("div",{className:"tbl-wrap"});var tbl=el("table");
  var thead=el("thead");var hr=el("tr");
  ["#","Day","Time","Svc","Pax","Earn","Dur","\u03c1 trip","m\u1d62","m\u0303\u2099","Cum \u00a3","Cum H","\u03c1 avg","r\u2099","Rec%","State"].forEach(function(h){hr.appendChild(el("th",{},h));});
  thead.appendChild(hr);tbl.appendChild(thead);
  var tbody=el("tbody");
  for(var ti=w.trips.length-1;ti>=0;ti--){var t=w.trips[ti];
    var tp=ph(t.r_n);var isBE=t.n===w.be_trip,isTgt=t.n===w.target_trip;
    var tr=el("tr",{className:(isBE?"be-row":isTgt?"tgt-row":"")+" map-clickable"});
    (function(num){tr.addEventListener("click",function(){mapShowTrip(num)});})(t.n);
    var marker=isBE?" \u2605":isTgt?" \u25c6":"";
    tr.appendChild(el("td",{style:{color:"#f8fafc",fontWeight:(isBE||isTgt)?700:400}},t.n+marker));
    tr.appendChild(el("td",{style:{color:"#94a3b8"}},t.day));
    tr.appendChild(el("td",{style:{color:"#94a3b8"}},t.time));
    tr.appendChild(el("td",{style:{color:"#67e8f9",fontSize:"9px"}},t.service));
    tr.appendChild(el("td",{style:{color:"#94a3b8",fontSize:"9px"}},t.pax||""));
    tr.appendChild(el("td",{style:{color:"#f8fafc"}},"\u00a3"+m$(t.t_earn)));
    tr.appendChild(el("td",{style:{color:"#94a3b8"}},Math.round(t.t_dur*60)+"m"));
    tr.appendChild(el("td",{style:{color:t.t_rho>=35?"#34d399":t.t_rho>=20?"#fbbf24":"#f87171"}},"\u00a3"+m$(t.t_rho)));
    tr.appendChild(el("td",{style:{color:t.mnhr>=0?"#34d399":"#f87171",fontSize:"9px"}},"\u00a3"+m$(t.mnhr)));
    tr.appendChild(el("td",{style:{color:"#00e5ff",fontSize:"9px"}},"\u00a3"+m$(t.mnhr_ema)));
    tr.appendChild(el("td",{style:{color:"#fbbf24",fontWeight:600}},"\u00a3"+m$(t.cum_e)));
    tr.appendChild(el("td",{style:{color:"#94a3b8"}},m$(t.cum_h)+"h"));
    tr.appendChild(el("td",{style:{color:"#06b6d4"}},"\u00a3"+m$(t.rho)));
    tr.appendChild(el("td",{style:{fontWeight:700,color:PC[tp]}},"\u00a3"+m$(t.r_n)));
    tr.appendChild(el("td",{style:{color:t.recovery>=100?"#34d399":"#94a3b8"}},m$(t.recovery)+"%"));
    var badge=el("span",{className:"phase-badge"},SL[t.state]||t.state);badge.style.background=(SC[t.state]||"#334155")+"20";badge.style.color=SC[t.state]||"#94a3b8";
    tr.appendChild(el("td",{},[badge]));
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);tblWrap.appendChild(tbl);panel.appendChild(tblWrap);

  // Route Map (collapsible, starts collapsed)
  var mapInitialized=false;
  var mapToggle=el("div",{className:"map-toggle",onClick:function(){
    var body=document.getElementById("map-body");
    var isCollapsed=body.style.display==="none";
    body.style.display=isCollapsed?"block":"none";
    mapChev.textContent=isCollapsed?"\u25bc":"\u25b6";
    mapToggle.style.borderRadius=isCollapsed?"10px 10px 0 0":"10px";
    if(isCollapsed&&!mapInitialized){
      mapInitialized=true;
      setTimeout(function(){makeLeafletMap(w);},100);
    }
  }});
  var mapChev=el("span",{style:{color:"#22c55e",fontSize:"11px",marginRight:"8px"}},"\u25b6");
  var mapTitleEl=el("span",{style:{color:"#f8fafc",fontWeight:700,fontSize:"13px"}},"Route Map \u00b7 "+w.label);
  mapToggle.appendChild(el("div",{style:{display:"flex",alignItems:"center"}},[mapChev,mapTitleEl]));
  mapToggle.appendChild(el("span",{style:{color:"#64748b",fontSize:"10px"}},"click to expand"));
  panel.appendChild(mapToggle);
  var mapBody=el("div",{id:"map-body",className:"map-body"});
  var mapContainer=el("div",{className:"map-container"});
  mapContainer.appendChild(el("div",{id:"week-map"}));
  // Color mode buttons
  var colorBtns=el("div",{className:"map-color-btns"});
  ["default","mnhr","four_state","per_hr","per_mile"].forEach(function(mode){
    var label=mode==="default"?"Default":mode==="mnhr"?"MNHR":mode==="four_state"?"State":mode==="per_hr"?"\u00a3/hr":"\u00a3/mi";
    var b=el("button",{className:"map-color-btn"+(mapColorMode===mode?" active":""),"data-mode":mode,onClick:function(){setMapColorMode(mode,w);}},label);
    colorBtns.appendChild(b);
  });
  mapContainer.appendChild(colorBtns);
  // Show All button
  var showAllBtn=el("button",{className:"map-show-all-btn",onClick:function(){mapShowAll(w);}},"Show All Trips");
  mapContainer.appendChild(showAllBtn);
  // Legend
  var legend=el("div",{className:"map-legend"});
  legend.innerHTML="<div class='map-legend-row'><span class='map-legend-line' style='background:#FFA500'></span> Enroute</div><div class='map-legend-row'><span class='map-legend-line' style='background:#22c55e'></span> Trip</div><div class='map-legend-row'><span class='map-legend-line' style='background:#666;opacity:0.5'></span> Deadhead</div>";
  mapContainer.appendChild(legend);
  mapBody.appendChild(mapContainer);
  panel.appendChild(mapBody);

  app.appendChild(panel);

  // Conclusion (aggregate stats)
  if(W.length>1){
    var conc=el("div",{className:"conclusion"});
    conc.appendChild(el("div",{className:"conclusion-title"},"Conclusion & Summary"));
    var cRho=tH>0?tE/tH:0,cRn=tH>0?(tE-CW*W.length)/tH:0;
    var cGrid=el("div",{className:"conclusion-grid"});
    [["Total Earnings","\u00a3"+m$(tE),W.length+" weeks","#f8fafc"],
     ["Total Costs","\u00a3"+m$(CW*W.length),"\u00a3"+CW+"\u00d7"+W.length,"#f87171"],
     ["Net","\u00a3"+m$(tE-CW*W.length),tE>=CW*W.length?"surplus":"deficit",tE>=CW*W.length?"#34d399":"#f87171"],
     ["Aggregate CNHR","\u00a3"+m$(cRn)+"/hr",cRn>=RS?"At target":"Below",cRn>=RS?"#34d399":"#f87171"],
     ["Weeks at r*",atT+"/"+W.length,"target",atT>0?"#34d399":"#f87171"],
     ["Weeks at BE",atBE+"/"+W.length,"break-even",atBE>0?"#34d399":"#f87171"]
    ].forEach(function(c){var card=el("div",{className:"conclusion-card"});card.appendChild(el("div",{className:"cc-label"},c[0]));var v=el("div",{className:"cc-val"},c[1]);v.style.color=c[3];card.appendChild(v);card.appendChild(el("div",{className:"cc-sub"},c[2]));cGrid.appendChild(card);});
    conc.appendChild(cGrid);app.appendChild(conc);
  }

  app.appendChild(el("div",{className:"foot"},"CNHR\u2013MNHR Dashboard v3.0 \u00b7 \u03b1="+ALPHA+" \u00b7 h\u0304="+H_BAR+"h \u00b7 \u03bb=\u00a3"+LAMBDA_PAID.toFixed(2)+"/hr \u00b7 Portal data"));
}

render();
</script>
</body>
</html>
